
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚇 捷運完整版</title>

<style>
body{margin:0;background:black;color:white;text-align:center;font-family:Arial;}

#overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

button{
  font-size:20px;
  padding:12px 25px;
  margin:10px;
  border:none;
  border-radius:10px;
}

.chrome{background:#4CAF50;color:white;}
.line{background:#ff9800;color:white;}

#train-container{
  width:95%;
  height:120px;
  margin:20px auto;
  background:#222;
  position:relative;
  border-radius:15px;
}

#train{
  position:absolute;
  bottom:0;
  height:90px;
  transition:2s;
}

#door{
  width:200px;height:120px;margin:20px auto;
  border:3px solid white;overflow:hidden;position:relative;
}

.door-left,.door-right{
  position:absolute;width:50%;height:100%;background:#ccc;
  transition:1s;
}
.door-left{left:0;}
.door-right{right:0;}

.open .door-left{transform:translateX(-100%);}
.open .door-right{transform:translateX(100%);}
</style>
</head>

<body>

<!-- ⭐ 判斷畫面 -->
<div id="overlay">
  <h2 id="msg">載入中...</h2>
  <button class="chrome" onclick="openChrome()">🚀 用Chrome開啟完整版</button>
  <button class="line" onclick="startLite()">👉 直接在LINE執行（簡化版）</button>
</div>

<h2>🚇 捷運系統</h2>

<div id="train-container">
  <img id="train" src="https://tse1.mm.bing.net/th/id/OIP.QZNIRBu9YMuwgxewtHkGFgHaDw">
</div>

<div id="door">
  <div class="door-left"></div>
  <div class="door-right"></div>
</div>

<div id="text">尚未開始</div>

<audio id="ding" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>
const isLine = navigator.userAgent.includes("Line");

document.getElementById("msg").innerText =
  isLine ? "⚠ LINE模式（功能受限）" : "✅ 瀏覽器模式（完整版）";

function openChrome(){
  window.open(location.href,"_blank");
}

function unlock(){
  speechSynthesis.speak(new SpeechSynthesisUtterance(" "));
  document.getElementById("ding").play().catch(()=>{});
}

const stations=[
["淡水","Tamsui"],["北投","Beitou"],["士林","Shilin"],
["中山","Zhongshan"],["台北車站","Taipei"],
["大安","Daan"],["象山","Xiangshan"]
];

let i=0,dir=1;

function move(){
  let w=document.getElementById("train-container").clientWidth;
  document.getElementById("train").style.left=(i*(w/(stations.length-1)))+"px";
}

function speak(t,l){
  let u=new SpeechSynthesisUtterance(t);
  u.lang=l;
  speechSynthesis.speak(u);
}

function openDoor(){document.getElementById("door").classList.add("open");}
function closeDoor(){document.getElementById("door").classList.remove("open");}

function fullMode(){
  unlock();
  startSystem(true);
}

function startLite(){
  startSystem(false);
}

function startSystem(full){
  document.getElementById("overlay").style.display="none";

  setInterval(()=>{
    let [zh,en]=stations[i];
    document.getElementById("text").innerText=zh+" / "+en;

    move();

    if(full){
      document.getElementById("ding").play();
      speak("下一站 "+zh,"zh-TW");
      setTimeout(()=>speak("Next "+en,"en-US"),2000);
      setTimeout(openDoor,3000);
      setTimeout(closeDoor,6000);
    }

    if(i==stations.length-1) dir=-1;
    else if(i==0) dir=1;

    i+=dir;

  },7000);
}

// ⭐ 自動判斷
window.onload=()=>{
  if(!isLine){
    fullMode(); // Chrome直接全開
  }
}
</script>

</body>
</html>
