
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚇 捷運完整版（LINE + 手機瀏覽器）</title>
<style>
body{margin:0;font-family:Arial;text-align:center;background:#000;color:white;}
#overlay{
  position:fixed;width:100%;height:100%;background:#111;
  display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:9999;
}
button{
  font-size:18px;padding:12px 20px;margin:10px;border:none;border-radius:10px;cursor:pointer;
}
.chrome{background:#4CAF50;color:white;}
.line{background:#ff9800;color:white;}
#train-container{width:90%;height:120px;margin:20px auto;background:#222;position:relative;border-radius:15px;}
#train{position:absolute;bottom:0;height:90px;transition:2s;}
#door{width:200px;height:120px;margin:20px auto;position:relative;overflow:hidden;border:3px solid white;}
.door-left,.door-right{position:absolute;width:50%;height:100%;background:#ccc;transition:1s;}
.door-left{left:0;} .door-right{right:0;}
.open .door-left{transform:translateX(-100%);}
.open .door-right{transform:translateX(100%);}
#text{font-size:24px;margin-top:10px;color:#FFD700;}
</style>
</head>
<body>

<!-- LINE / 瀏覽器判斷提示 -->
<div id="overlay">
  <h2 id="msg">載入中...</h2>
  <button class="chrome" onclick="openBrowser()">🚀 用瀏覽器開啟完整版</button>
  <button class="line" onclick="startLite()">👉 直接在LINE執行（簡化版）</button>
</div>

<h2>🚇 捷運系統</h2>

<div id="train-container">
  <img id="train" src="https://tse1.mm.bing.net/th/id/OIP.QZNIRBu9YMuwgxewtHkGFgHaDw">
</div>

<div id="door">
  <div class="door-left"></div>
  <div class="door-right"></div>
</div>

<div id="text">尚未開始</div>
<audio id="ding" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>
const isLine = navigator.userAgent.includes("Line");

document.getElementById("msg").innerText =
  isLine ? "⚠ LINE模式（受限，請點擊Chrome或Safari）" : "✅ 瀏覽器模式（完整版）";

function openBrowser(){
  alert("請在手機瀏覽器打開此頁面以播放完整動畫與聲音！");
  window.open(location.href,"_blank");
}

function unlock(){
  // 強制解鎖聲音播放
  const utt=new SpeechSynthesisUtterance(" ");
  speechSynthesis.speak(utt);
  document.getElementById("ding").play().catch(()=>{});
}

const stations=[
 ["淡水", "Tamsui"],
      ["紅樹林", "Hongshulin"],
      ["竹圍", "Zhuwei"],
      ["關渡", "Guandu"],
      ["忠義", "Zhongyi"],
      ["復興崗", "Fuxinggang"],
      ["北投", "Beitou"],
      ["奇岩", "Qiyan"],
      ["唭哩岸", "Qilian"],
      ["石牌", "Shipai"],
      ["明德", "Mingde"],
      ["芝山", "Zhishan"],
      ["士林", "Shilin"],
      ["劍潭", "Jiantan"],
      ["圓山", "Yuanshan"],
      ["民權西路", "Minquan W. Rd."],
      ["雙連", "Shuanglian"],
      ["中山", "Zhongshan"],
      ["台北車站", "Taipei Main Station"],
      ["台大醫院", "NTU Hospital"],
      ["中正紀念堂", "Chiang Kai-Shek Memorial Hall"],
      ["東門", "Dongmen"],
      ["大安森林公園", "Daan Park"],
      ["大安", "Daan"],
      ["信義安和", "Xinyi Anhe"],
      ["台北101/世貿", "Taipei 101 / World Trade Center"],
      ["象山", "Xiangshan"]
];

let i=0,dir=1;

function move(){
  let w=document.getElementById("train-container").clientWidth;
  document.getElementById("train").style.left=(i*(w/(stations.length-1)))+"px";
}

function speak(text,lang){
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lang;
  speechSynthesis.speak(u);
}

function openDoor(){document.getElementById("door").classList.add("open");}
function closeDoor(){document.getElementById("door").classList.remove("open");}

function startLite(){
  startSystem(false);
}

function startFull(){
  startSystem(true);
}

function startSystem(full){
  document.getElementById("overlay").style.display="none";
  unlock(); // 解鎖聲音

  setInterval(()=>{
    let [zh,en]=stations[i];
    document.getElementById("text").innerText=zh+" / "+en;
    move();

    if(full){
      document.getElementById("ding").play();
      speak("下一站 "+zh,"zh-TW");
      setTimeout(()=>speak("Next station, "+en,"en-US"),2000);
      setTimeout(openDoor,3000);
      setTimeout(closeDoor,6000);
    }

    if(i==stations.length-1) dir=-1;
    else if(i==0) dir=1;

    i+=dir;
  },7000);
}

// 自動判斷
window.onload=()=>{
  if(!isLine){
    startFull(); // 手機瀏覽器直接全開
  }
}
</script>

</body>
</html>
